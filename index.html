<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AES Key Generator</title>
<style>
body{
    font-family: Arial;
    background:#0f172a;
    color:white;
    text-align:center;
    padding:40px;
}
.box{
    background:#1e293b;
    padding:30px;
    border-radius:10px;
    width:400px;
    margin:auto;
}
input, select{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:none;
}
button{
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
    cursor:pointer;
}
button:hover{
    background:#16a34a;
}
.copy{
    background:#3b82f6;
}
.copy:hover{
    background:#2563eb;
}
.save{
    background:#f59e0b;
}
.save:hover{
    background:#d97706;
}
.button-group{
    display:flex;
    gap:10px;
    justify-content:center;
}
</style>
</head>

<body>

<div class="box">

<h2>🔐 AES Key & IV Generator</h2>

<select id="keySize">
<option value="16">AES-128</option>
<option value="24">AES-192</option>
<option value="32" selected>AES-256</option>
</select>

<br><br>

<button onclick="generate()">Generate</button>

<h3>AES Key</h3>
<input id="key" readonly>
<div class="button-group">
    <button class="copy" onclick="copyText('key')">Copy Key</button>
</div>

<h3>IV</h3>
<input id="iv" readonly>
<div class="button-group">
    <button class="copy" onclick="copyText('iv')">Copy IV</button>
</div>

<div style="margin-top:20px;">
    <button class="save" onclick="saveToJson()">💾 Save to key.json</button>
</div>

</div>

<script>

function randomHex(bytes){
    let array = new Uint8Array(bytes);
    crypto.getRandomValues(array);
    return Array.from(array, b => ('00'+b.toString(16)).slice(-2)).join('');
}

function generate(){
    let size = parseInt(document.getElementById("keySize").value);
    let key = randomHex(size);
    let iv = randomHex(16);
    
    document.getElementById("key").value = key;
    document.getElementById("iv").value = iv;
}

function copyText(id){
    let text = document.getElementById(id);
    text.select();
    document.execCommand("copy");
    alert("Copied!");
}

function saveToJson(){
    let key = document.getElementById("key").value;
    let iv = document.getElementById("iv").value;
    let keySize = document.getElementById("keySize").value;
    let keyType = keySize === "16" ? "AES-128" : keySize === "24" ? "AES-192" : "AES-256";
    
    if(!key || !iv){
        alert("Please generate key and IV first!");
        return;
    }
    
    let data = {
        algorithm: keyType,
        keySize: keySize + " bytes",
        key: key,
        iv: iv,
        generatedAt: new Date().toISOString(),
        format: "hex"
    };
    
    let jsonStr = JSON.stringify(data, null, 2);
    let blob = new Blob([jsonStr], {type: "application/json"});
    let url = URL.createObjectURL(blob);
    let a = document.createElement("a");
    a.href = url;
    a.download = "key.json";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    
    alert("key.json downloaded successfully!");
}

// Generate initial values on page load
window.onload = generate;

</script>

</body>
</html>
